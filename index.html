<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
  <meta name="gist-token" content="%%GIST_TOKEN%%">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insive · Calendário Editorial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', 'Segoe UI', sans-serif;
    background: #f0ede8;
    color: #0E2347;
    min-height: 100vh;
  }

  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap');

  /* HEADER */
  header {
    background: #0E2347;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .logo span { color: #C9A84C; }
  .header-sub {
    font-size: 11px;
    color: #7a92b8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* CONTROLES */
  .controls {
    padding: 20px 32px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-nav {
    width: 32px; height: 32px;
    border: 1px solid #c5bfb5;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    color: #0E2347;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-nav:hover { background: #0E2347; color: #fff; }
  .month-label {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #0E2347;
    min-width: 160px;
    text-align: center;
  }
  .btn-add {
    margin-left: auto;
    background: #C9A84C;
    color: #0E2347;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* LEGENDA */
  .legend {
    padding: 12px 32px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #5a5a5a;
    letter-spacing: 0.05em;
  }
  .leg-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* CALENDÁRIO GRID */
  .cal-wrap { padding: 0 32px 32px; }

  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
  }
  .cal-header-day {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a8a8a;
    padding: 8px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    background: #fff;
    border-radius: 6px;
    min-height: 100px;
    padding: 8px;
    position: relative;
    transition: box-shadow 0.15s;
  }
  .cal-day:hover { box-shadow: 0 2px 12px rgba(14,35,71,0.1); }
  .cal-day.other-month { background: #f8f6f2; opacity: 0.5; }
  .cal-day.today { box-shadow: 0 0 0 2px #C9A84C; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: #0E2347;
    margin-bottom: 4px;
  }
  .cal-day.today .day-num {
    background: #C9A84C;
    color: #0E2347;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  /* POST CARD dentro do dia */
  .post-card {
    border-radius: 5px;
    padding: 5px 7px;
    margin-bottom: 3px;
    cursor: pointer;
    font-size: 10px;
    line-height: 1.3;
    transition: opacity 0.15s;
    position: relative;
  }
  .post-card:hover { opacity: 0.85; }
  .post-card .pc-hora {
    font-size: 9px;
    opacity: 0.75;
    font-weight: 500;
  }
  .post-card .pc-titulo {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .post-card .pc-layout {
    font-size: 8px;
    opacity: 0.7;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* cores por status */
  .status-approved  { background: #e8f5e9; color: #1b5e20; border-left: 3px solid #2e7d32; }
  .status-ready     { background: #fff8e1; color: #5a3e00; border-left: 3px solid #C9A84C; }
  .status-pending   { background: #e3eaf5; color: #0E2347; border-left: 3px solid #7a92b8; }
  .status-posted    { background: #f0ede8; color: #6b6b6b; border-left: 3px solid #bbb; }
  .status-planned   { background: #f0ede8; color: #9a9a9a; border-left: 3px solid #ccc; border-style: dashed; }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(14,35,71,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    background: #0E2347;
    padding: 20px 24px;
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: 18px;
  }
  .modal-header .tecnica-tag {
    font-size: 10px;
    color: #C9A84C;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .modal-close {
    background: none; border: none;
    color: #fff; font-size: 22px;
    cursor: pointer; line-height: 1;
    opacity: 0.7;
  }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 20px 24px; }

  .modal-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid #f0ede8;
    gap: 12px;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row label {
    font-size: 11px;
    font-weight: 600;
    color: #8a8a8a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-width: 80px;
  }
  .modal-row .val {
    font-size: 13px;
    color: #0E2347;
    text-align: right;
    flex: 1;
    line-height: 1.5;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-approved { background: #e8f5e9; color: #2e7d32; }
  .badge-ready    { background: #fff8e1; color: #5a3e00; }
  .badge-pending  { background: #e3eaf5; color: #0E2347; }
  .badge-posted   { background: #f0ede8; color: #6b6b6b; }

  .legenda-box {
    background: #f8f6f2;
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: #3a3a3a;
    line-height: 1.7;
    white-space: pre-wrap;
    margin-top: 4px;
    max-height: 140px;
    overflow-y: auto;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn-action {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
    letter-spacing: 0.05em;
  }
  .btn-action:hover { opacity: 0.8; }
  .btn-aprovar  { background: #C9A84C; color: #0E2347; }
  .btn-postado  { background: #2e7d32; color: #fff; }
  .btn-cancelar { background: #f0ede8; color: #5a5a5a; }

  /* FORM novo post */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #8a8a8a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    color: #0E2347;
    font-family: 'Jost', sans-serif;
    background: #fff;
  }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #C9A84C;
  }

  .semana-info {
    padding: 10px 32px 0;
    font-size: 12px;
    color: #8a8a8a;
  }
  .semana-info strong { color: #0E2347; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">I N S I V E <span>·</span></div>
    <div class="header-sub">Calendário Editorial</div>
  </div>
  <div style="text-align:right;">
    <div style="font-size:12px; color:#7a92b8;" id="hoje-label"></div>
    <div style="font-size:11px; color:#C9A84C; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;" id="layout-semana"></div>
  </div>
</header>

<div class="controls">
  <div class="month-nav">
    <button class="btn-nav" onclick="mudarMes(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="btn-nav" onclick="mudarMes(1)">›</button>
  </div>
  <button class="btn-add" onclick="abrirFormNovo()">+ Novo post</button>
</div>

<div class="semana-info" id="semana-info"></div>

<div class="legend" style="padding:10px 32px 4px;">
  <div class="leg-item"><div class="leg-dot" style="background:#2e7d32"></div> Aprovado</div>
  <div class="leg-item"><div class="leg-dot" style="background:#C9A84C"></div> Pronto</div>
  <div class="leg-item"><div class="leg-dot" style="background:#7a92b8"></div> Pendente</div>
  <div class="leg-item"><div class="leg-dot" style="background:#bbb"></div> Postado</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ccc; border: 1px dashed #999;"></div> Planejado</div>
</div>

<div class="cal-wrap">
  <div class="cal-header">
    <div class="cal-header-day">DOM</div>
    <div class="cal-header-day">SEG</div>
    <div class="cal-header-day">TER</div>
    <div class="cal-header-day">QUA</div>
    <div class="cal-header-day">QUI</div>
    <div class="cal-header-day">SEX</div>
    <div class="cal-header-day">SÁB</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-bg" id="modal-bg" onclick="fecharModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <h2 id="m-titulo"></h2>
        <div class="tecnica-tag" id="m-tecnica"></div>
      </div>
      <button class="modal-close" onclick="fecharModalBtn()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- MODAL NOVO POST -->
<div class="modal-bg" id="modal-novo-bg" onclick="fecharModalNovo(event)">
  <div class="modal" id="modal-novo">
    <div class="modal-header">
      <div>
        <h2>Novo Post</h2>
        <div class="tecnica-tag">@matheusrodrigues.enf</div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modal-novo-bg').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
      <div class="form-group">
        <label>Horário</label>
        <input type="time" id="f-horario" value="08:00">
      </div>
      <div class="form-group">
        <label>Técnica / Tema</label>
        <input type="text" id="f-tecnica" placeholder="ex: Ventosaterapia">
      </div>
      <div class="form-group">
        <label>Formato</label>
        <select id="f-formato">
          <option>Carrossel</option>
          <option>Reels</option>
          <option>Post único</option>
          <option>Story</option>
        </select>
      </div>
      <div class="form-group">
        <label>Layout</label>
        <select id="f-layout">
          <option value="A">A — Navy clássico</option>
          <option value="B">B — Fundo claro</option>
          <option value="C">C — Fundo gold</option>
          <option value="D">D — Foto full-bleed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Legenda (opcional)</label>
        <textarea id="f-legenda" placeholder="Cole a legenda aqui..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-action btn-aprovar" onclick="salvarNovoPost()">Salvar post</button>
        <button class="btn-action btn-cancelar" onclick="document.getElementById('modal-novo-bg').classList.remove('open')">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script>
const GIST_ID = '41713001ba437e11033bd18cb02d68bd';
const TOKEN   = '';

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const LAYOUTS = { A:'Navy clássico', B:'Fundo claro', C:'Fundo gold', D:'Foto full-bleed' };
const ROTACAO = ['A','B','C','D'];

let posts = [];
let sistema = {};
let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let postSelecionado = null;

async function carregarDados() {
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      const GIST_TOKEN = document.querySelector('meta[name=gist-token]')?.content || '';
    headers: { 'Authorization': `token ${GIST_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    posts = JSON.parse(data.files['insive_posts.json'].content);
    if (data.files['insive_sistema.json']) {
      sistema = JSON.parse(data.files['insive_sistema.json'].content);
    }
  } catch(e) {
    console.error('Erro ao carregar Gist:', e);
  }
  renderizar();
}

async function salvarGist() {
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify({
      files: {
        'insive_posts.json': { content: JSON.stringify(posts, null, 2) },
        'insive_sistema.json': { content: JSON.stringify(sistema, null, 2) }
      }
    })
  });
}

function getLayoutSemana(data) {
  const inicio = new Date('2026-06-23');
  const d = new Date(data);
  const diff = Math.floor((d - inicio) / (7 * 24 * 60 * 60 * 1000));
  const idx = ((diff % 4) + 4) % 4;
  return ROTACAO[idx];
}

function renderizar() {
  const hoje = new Date();
  document.getElementById('hoje-label').textContent =
    hoje.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('layout-semana').textContent =
    `Semana atual · Layout ${getLayoutSemana(hoje.toISOString().slice(0,10))} — ${LAYOUTS[getLayoutSemana(hoje.toISOString().slice(0,10))]}`;

  const inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1);
  const fimSemana = new Date(inicioSemana);
  fimSemana.setDate(inicioSemana.getDate() + 6);
  const postsSemana = posts.filter(p => p.status !== 'planned').filter(p => {
    const d = p.data.slice(0,10);
    return d >= inicioSemana.toISOString().slice(0,10) && d <= fimSemana.toISOString().slice(0,10);
  });
  document.getElementById('semana-info').innerHTML =
    `<strong>${postsSemana.length} post${postsSemana.length!==1?'s':''} esta semana</strong> · ${inicioSemana.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} a ${fimSemana.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})}`;

  document.getElementById('month-label').textContent = `${MESES[mesAtual]} ${anoAtual}`;
  renderizarGrade();
}

function renderizarGrade() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const primeiroDia = new Date(anoAtual, mesAtual, 1);
  const ultimoDia  = new Date(anoAtual, mesAtual + 1, 0);
  const hoje = new Date();

  let inicioPad = primeiroDia.getDay();
  const totalCelulas = Math.ceil((inicioPad + ultimoDia.getDate()) / 7) * 7;

  for (let i = 0; i < totalCelulas; i++) {
    const diaOffset = i - inicioPad + 1;
    const data = new Date(anoAtual, mesAtual, diaOffset);
    const dataStr = data.toISOString().slice(0,10);

    const cel = document.createElement('div');
    cel.className = 'cal-day' +
      (data.getMonth() !== mesAtual ? ' other-month' : '') +
      (dataStr === hoje.toISOString().slice(0,10) ? ' today' : '');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = data.getDate();
    cel.appendChild(numDiv);

    const postsDia = posts.filter(p => p.data.slice(0,10) === dataStr);
    postsDia.forEach(p => {
      const card = document.createElement('div');
      card.className = `post-card status-${p.status}`;
      card.innerHTML = `
        <div class="pc-hora">${p.horario || ''} · Layout ${p.layout || 'A'}</div>
        <div class="pc-titulo">${p.tecnica}</div>
        <div class="pc-layout">${p.formato}</div>
      `;
      card.onclick = () => abrirModal(p);
      cel.appendChild(card);
    });

    grid.appendChild(cel);
  }
}

function abrirModal(post) {
  postSelecionado = post;
  document.getElementById('m-titulo').textContent = post.tecnica;
  document.getElementById('m-tecnica').textContent = post.tipo + ' · ' + post.formato;

  const statusLabel = { approved:'Aprovado', ready:'Pronto p/ revisão', pending:'Pendente', posted:'Postado', planned:'Planejado' };
  const badgeClass  = { approved:'badge-approved', ready:'badge-ready', pending:'badge-pending', posted:'badge-posted', planned:'badge-posted' };

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="modal-row">
      <label>Data</label>
      <div class="val">${formatarData(post.data)} · ${post.horario || '08:00'}</div>
    </div>
    <div class="modal-row">
      <label>Status</label>
      <div class="val"><span class="status-badge ${badgeClass[post.status]||'badge-pending'}">${statusLabel[post.status]||post.status}</span></div>
    </div>
    <div class="modal-row">
      <label>Layout</label>
      <div class="val"><strong>${post.layout || 'A'}</strong> — ${LAYOUTS[post.layout||'A']}</div>
    </div>
    <div class="modal-row">
      <label>Pasta</label>
      <div class="val" style="font-size:11px; word-break:break-all; color:#7a92b8;">${(post.pasta||'').split('\\').slice(-2).join('\\') || '—'}</div>
    </div>
    <div class="modal-row" style="flex-direction:column; align-items:flex-start;">
      <label style="margin-bottom:6px;">Legenda</label>
      <div class="legenda-box">${post.legenda || '—'}</div>
    </div>
    <div class="modal-actions">
      ${post.status !== 'approved' && post.status !== 'posted' ?
        `<button class="btn-action btn-aprovar" onclick="aprovarPost()">✓ Aprovar</button>` : ''}
      ${post.status === 'approved' ?
        `<button class="btn-action btn-postado" onclick="marcarPostado()">Marcar como postado</button>` : ''}
      <button class="btn-action btn-cancelar" onclick="fecharModalBtn()">Fechar</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

async function aprovarPost() {
  const idx = posts.findIndex(p => p.id === postSelecionado.id);
  if (idx === -1) return;
  posts[idx].status = 'approved';
  posts[idx].aprovado_em = new Date().toISOString().slice(0,10);
  postSelecionado = posts[idx];
  await salvarGist();
  fecharModalBtn();
  renderizar();
}

async function marcarPostado() {
  const idx = posts.findIndex(p => p.id === postSelecionado.id);
  if (idx === -1) return;
  posts[idx].status = 'posted';
  posts[idx].publicado_em = new Date().toISOString().slice(0,10);
  await salvarGist();
  fecharModalBtn();
  renderizar();
}

function abrirFormNovo() {
  const hoje = new Date().toISOString().slice(0,10);
  document.getElementById('f-data').value = hoje;
  document.getElementById('f-layout').value = getLayoutSemana(hoje);
  document.getElementById('modal-novo-bg').classList.add('open');
}

async function salvarNovoPost() {
  const data = document.getElementById('f-data').value;
  const tecnica = document.getElementById('f-tecnica').value.trim();
  if (!data || !tecnica) { alert('Data e técnica são obrigatórios.'); return; }

  const slug = tecnica.toLowerCase()
    .replace(/\s+/g,'_').replace(/[ãâá]/g,'a').replace(/ç/g,'c')
    .replace(/[éê]/g,'e').replace(/[óô]/g,'o').replace(/[úí]/g,'u')
    .replace(/[^a-z0-9_]/g,'').slice(0,20);

  const BASE = 'C:\\Users\\mathe\\.claude\\skills\\insive-posts\\output';
  const pasta = `${BASE}\\${data}_${slug}`;

  const novo = {
    id: `${data}-${slug}`,
    data,
    horario: document.getElementById('f-horario').value,
    tipo: 'Educativo',
    tecnica,
    formato: document.getElementById('f-formato').value,
    layout: document.getElementById('f-layout').value,
    tema: slug,
    status: 'pending',
    pasta,
    arquivos: Array.from({length:7},(_,i)=>`${pasta}\\slide_${String(i+1).padStart(2,'0')}.png`),
    legenda: document.getElementById('f-legenda').value,
    aprovado_em: null,
    publicado_em: null
  };

  posts.push(novo);
  await salvarGist();
  document.getElementById('modal-novo-bg').classList.remove('open');
  document.getElementById('f-tecnica').value = '';
  document.getElementById('f-legenda').value = '';
  renderizar();
}

function fecharModal(e) {
  if (e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}
function fecharModalNovo(e) {
  if (e.target === document.getElementById('modal-novo-bg'))
    document.getElementById('modal-novo-bg').classList.remove('open');
}
function fecharModalBtn() {
  document.getElementById('modal-bg').classList.remove('open');
}

function mudarMes(delta) {
  mesAtual += delta;
  if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
  if (mesAtual < 0)  { mesAtual = 11; anoAtual--; }
  renderizarGrade();
  document.getElementById('month-label').textContent = `${MESES[mesAtual]} ${anoAtual}`;
}

function formatarData(str) {
  const [a,m,d] = str.slice(0,10).split('-');
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d} ${meses[parseInt(m)-1]} ${a}`;
}

carregarDados();
</script>
